<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante El Galeón | Tradición, Brasas y Rabo de Toro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        oak: '#3E2723',
                        terracotta: '#E65100', 
                        parchment: '#F5F5F5',
                        olive: '#556B2F',
                    },
                    fontFamily: {
                        serif: ['Libre Baskerville', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #F5F5F5 !important; color: #3E2723 !important; }
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .btn-rustic { background: #E65100 !important; color: white !important; border: 1px solid #E65100; padding: 1rem 2rem; display: inline-block; transition: 0.3s; text-align: center; font-weight: bold; }
        .btn-rustic:hover { background: transparent !important; color: #E65100 !important; transform: scale(1.05); }
        .menu-item-dot { flex-grow: 1; border-bottom: 1px dotted rgba(62, 39, 35, 0.3); margin: 0 10px 5px 10px; }
        #main-nav { top: 0 !important; left: 0; right: 0; position: fixed; width: 100%; z-index: 100; transition: 0.5s; }
        .nav-scrolled { background: rgba(245, 245, 245, 0.98) !important; backdrop-filter: blur(10px); box-shadow: 0 2px 15px rgba(0,0,0,0.1); border-bottom: 1px solid rgba(62,39,35,0.1); }
        h1, h2, h3, h4, .font-serif { font-family: 'Libre Baskerville', serif !important; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="font-sans overflow-x-hidden">

    <nav id="main-nav" class="py-5">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
                <i data-lucide="utensils" class="text-terracotta w-8 h-8"></i>
                <div class="flex flex-col text-white" id="nav-logo-text">
                    <span class="text-2xl font-bold leading-none">EL GALEÓN</span>
                    <span class="text-[10px] uppercase tracking-[0.3em] font-bold">Tradición y Brasas</span>
                </div>
            </div>
            <div class="hidden lg:flex items-center gap-8 text-[11px] uppercase tracking-[0.2em] font-bold text-white" id="nav-links">
                <a href="#" class="hover:text-terracotta transition-colors">Inicio</a>
                <a href="#historia" class="hover:text-terracotta transition-colors">Historia</a>
                <a href="#carta" class="hover:text-terracotta transition-colors">Carta</a>
                <a href="#especiales" class="hover:text-terracotta transition-colors">Menús</a>
                <a href="#reservas" class="hover:text-terracotta transition-colors">Reservas</a>
            </div>
        </div>
    </nav>

    <section class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&q=80&w=1920" class="w-full h-full object-cover brightness-[0.4]">
            <div class="absolute inset-0 bg-gradient-to-b from-black/40 to-parchment"></div>
        </div>
        <div class="relative z-10 text-center px-6">
            <div class="reveal active">
                <span class="text-white/80 text-sm uppercase tracking-[0.5em] font-bold mb-6 block">Móstoles • Alcorcón</span>
                <h1 class="text-6xl md:text-[8rem] text-white mb-8 leading-[0.85]">Sabor a <br><span class="italic text-terracotta">Leña y Piedra</span></h1>
                <a href="#reservas" class="btn-rustic uppercase font-bold tracking-widest shadow-2xl">RESERVAR MESA</a>
            </div>
        </div>
    </section>

    <section id="carta" class="py-32 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="reveal flex justify-between items-baseline group mb-8">
                <div class="flex-grow"><h5 class="text-xl font-bold">Rabo de Toro Original</h5><p class="text-xs italic">Sobre cremoso de patata y trufa.</p></div>
                <div class="menu-item-dot"></div><span class="font-bold">18,00€</span>
            </div>
            </div>
    </section>

    <script>
        lucide.createIcons();
        const nav = document.getElementById('main-nav');
        const logoText = document.getElementById('nav-logo-text');
        const navLinks = document.getElementById('nav-links');

        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                nav.classList.add('nav-scrolled');
                logoText.style.color = '#3E2723';
                navLinks.style.color = '#3E2723';
            } else {
                nav.classList.remove('nav-scrolled');
                logoText.style.color = 'white';
                navLinks.style.color = 'white';
            }
        });
        
        const reveals = document.querySelectorAll('.reveal');
        window.addEventListener('scroll', () => {
            reveals.forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight - 100) el.classList.add('active');
            });
        });
    </script>
</body>
</html>
